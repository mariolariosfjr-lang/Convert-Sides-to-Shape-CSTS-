name: Build C++ EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          install: mingw-w64-x86_64-gcc

      - name: Compile
        shell: msys2 {0}
        run: |
          g++ main.cpp -o shape.exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: shape-exe
          path: shape.exe
